<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f2f2f2;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
.container {
    background: white;
    padding: 30px;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0,0,0,0.2);
    text-align: center;
}
input {
    width: 120px;
    padding: 10px;
    margin: 10px;
    text-align: center;
    font-size: 18px;
}
button {
    padding: 10px 20px;
    margin: 10px;
    border: none;
    background: #1976d2;
    color: white;
    border-radius: 5px;
    cursor: pointer;
}
button:hover {
    background: #0d47a1;
}
h2 {
    margin-top: 20px;
}
</style>

</head>
<body>

<div class="container">
    <h1>Calculator</h1>

    <input type="number" id="num1" value="45">
    <input type="number" id="num2" value="45">

    <br>

    <button onclick="add()">Add</button>
    <button onclick="subtract()">Subtract</button>
    <button onclick="multiply()">Multiply</button>
    <button onclick="divide()">Divide</button>

    <h2 id="result">Result: 0</h2>
</div>

<script>
function getValues() {
    let a = Number(document.getElementById("num1").value);
    let b = Number(document.getElementById("num2").value);
    return [a, b];
}

function add() {
    let [a, b] = getValues();
    document.getElementById("result").innerText = "Result: " + (a + b);
}

function subtract() {
    let [a, b] = getValues();
    document.getElementById("result").innerText = "Result: " + (a - b);
}

function multiply() {
    let [a, b] = getValues();
    document.getElementById("result").innerText = "Result: " + (a * b);
}

function divide() {
    let [a, b] = getValues();
    document.getElementById("result").innerText = "Result: " + (a / b);
}
</script>

</body>
</html>
